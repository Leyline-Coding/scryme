name: CodeQL

# GitHub's first-party SAST. Results land in the repo's Security > Code scanning tab
# and annotate PRs. Free for public repositories.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 07:00 UTC) catches newly-published query updates
    # even when the code hasn't changed.
    - cron: "0 7 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python            # backend/
            build-mode: none
          - language: javascript-typescript  # desktop/ (Electron)
            build-mode: none
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
