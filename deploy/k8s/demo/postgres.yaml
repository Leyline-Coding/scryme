apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scryme-demo-postgres-data
  namespace: scryme-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scryme-demo-postgres
  namespace: scryme-demo
  labels:
    app: scryme-demo-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate  # single RWO volume, never two pods attached at once
  selector:
    matchLabels:
      app: scryme-demo-postgres
  template:
    metadata:
      labels:
        app: scryme-demo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          # Tuned for the demo's read-heavy trigram/regex search + facets/stats over ~115k cards.
          # Stock defaults (shared_buffers=128MB, work_mem=4MB) thrash the PVC because almost
          # nothing stays cached; these let the hot indexes/table pages stay resident in the 2Gi
          # limit. effective_cache_size is a planner hint (~OS cache), so it steers plans toward
          # index scans without reserving memory.
          args:
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "effective_cache_size=1536MB"
            - "-c"
            - "work_mem=32MB"
            - "-c"
            - "maintenance_work_mem=128MB"
            - "-c"
            - "random_page_cost=1.1"
          env:
            - name: POSTGRES_USER
              value: scryme
            - name: POSTGRES_DB
              value: scryme
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scryme-demo-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "scryme"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            # No CPU limit: let Postgres burst on heavy searches (nodes have ample headroom).
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scryme-demo-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: scryme-demo-postgres
  namespace: scryme-demo
spec:
  selector:
    app: scryme-demo-postgres
  ports:
    - port: 5432
      targetPort: 5432
