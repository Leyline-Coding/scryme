name: publish-image

# Builds the backend image and pushes it to GitHub Container Registry.
# Runs on a published release or a v* tag; also dispatchable manually.
on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write  # upload Trivy SARIF to the Security > Code scanning tab

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # QEMU lets the amd64 runner cross-build the arm64 image (Raspberry Pi / Apple Silicon).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Multi-arch manifest tags (e.g. :latest, :v1.2.3, :<sha>) — `docker pull` auto-selects arch.
      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short

      # Per-arch convenience tags (e.g. :latest-amd64, :v1.2.3-arm64) for pulling a specific arch.
      - name: Derive amd64 tags
        id: meta-amd64
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-amd64
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short

      - name: Derive arm64 tags
        id: meta-arm64
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-arm64
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push (multi-arch manifest)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (amd64 tags)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-amd64.outputs.tags }}
          labels: ${{ steps.meta-amd64.outputs.labels }}
          cache-from: type=gha

      - name: Build and push (arm64 tags)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta-arm64.outputs.tags }}
          labels: ${{ steps.meta-arm64.outputs.labels }}
          cache-from: type=gha

      # Scan the freshly-published image for OS/library vulnerabilities. Non-blocking:
      # findings are reported to Security > Code scanning, but a HIGH/CRITICAL does not
      # fail the publish (we're already logged in to GHCR, so Trivy can pull :latest).
      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy results to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image
