appId: app.scryme.desktop
productName: scryme
executableName: scryme
copyright: Leyline Coding

directories:
  output: release
  buildResources: build

# Auto-update source. electron-updater pulls the latest release + the generated latest*.yml from
# GitHub Releases. The desktop-release CI workflow publishes here on each tagged release.
publish:
  provider: github
  owner: Leyline-Coding
  repo: scryme
  # Upload to the already-published release for the tag (default is "draft", which electron-builder
  # refuses to attach to an existing published release).
  releaseType: release

# The frozen backend (built separately by `npm run build:backend`) ships as an extra resource so it
# lands at resources/backend/ — where src/main.js looks for it. asar can't hold an executable, so it
# stays unpacked.
extraResources:
  - from: dist/scryme-backend
    to: backend

# Disable asar: embedded-postgres resolves its native PG binaries relative to its own __dirname and
# stat/chmod/spawns them. Inside an asar that path isn't a real file (chmod → ENOTDIR), and
# asarUnpack doesn't help because the library still computes the in-archive path. With asar off the
# whole app is a plain directory tree (matching dev), so the binaries run from disk. The heavy
# backend is already shipped unpacked via extraResources, and the app's own JS is tiny.
asar: false

files:
  - "src/**"
  - "package.json"
  - "!**/*.md"

# Icons: electron-builder generates the platform formats (.icns / .ico) from build/icon.png
# (1024×1024) automatically, so only the Linux PNG is specified explicitly.
mac:
  category: public.app-category.utilities
  target:
    - dmg
    - zip
  # Signing-ready: with an Apple Developer cert (CSC_LINK/CSC_KEY_PASSWORD) these produce a signed
  # build; set notarize: true and provide APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID to
  # notarize. Harmless for the current unsigned builds. The entitlements let the bundled Postgres +
  # backend run under hardened runtime once signed.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false

win:
  target:
    - nsis

linux:
  category: Utility
  # Default targets (x64 runner builds both). The arm64 runner overrides this with `--linux AppImage`
  # in CI, because electron-builder's bundled fpm (for .deb) is x86-only and can't run on arm64.
  target:
    - AppImage
    - deb
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
