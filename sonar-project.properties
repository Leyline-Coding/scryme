# SonarQube analysis configuration for scryme.
# sonar.host.url / sonar.token are injected by Jenkins (withSonarQubeEnv 'SonarQube').

sonar.projectKey=scryme
sonar.projectName=scryme
sonar.sourceEncoding=UTF-8

# Production sources. Backend is the primary Python app; the desktop Electron
# shell (JS) is analyzed statically too (no coverage — it has no unit tests).
sonar.sources=backend/src,desktop/src

# Tests
sonar.tests=backend/tests

# Coverage (pytest addopts emit backend/coverage.xml as Cobertura)
sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml

# Exclude generated / vendored / data / non-source paths from analysis.
sonar.exclusions=backend/alembic/**,**/__pycache__/**,backend/src/data/**,backend/src/static/vendor/**,desktop/node_modules/**,desktop/dist/**,desktop/build/**,desktop/release/**,site/**,**/*.min.js
# Coverage only applies to the Python backend; keep tests out of the coverage denominator.
sonar.coverage.exclusions=backend/tests/**,desktop/**

# Rule suppressions (reviewed 2026-07-16). Each is a deliberate call, not a blanket mute:
#  - S8410/S8409/S8415: opinionated "modern FastAPI" style rules. `param: X = Depends()` (and our
#    response_model/HTTPException usage) is valid FastAPI, not a defect — kept as-is by choice.
#  - S8392: desktop_entry.py binds 0.0.0.0 on purpose for the opt-in LAN-sharing feature (guarded by
#    SCRYME_LAN_GUARD); it never binds broadly on the server/demo.
#  - S5725 in base.html: htmx/alpine now carry SRI hashes; the only remaining tag is the Tailwind
#    Play CDN, a dynamic JIT compiler that can't be subresource-integrity-hashed.
#  - ItemTagNotWithinContainerTagCheck in set_calendar.html: the <li> lives in a Jinja macro that is
#    only ever rendered inside a <ul>; Sonar's HTML checker can't resolve the macro.
sonar.issue.ignore.multicriteria=fa1,fa2,fa3,lanbind,twsri,jinjali
sonar.issue.ignore.multicriteria.fa1.ruleKey=python:S8410
sonar.issue.ignore.multicriteria.fa1.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.fa2.ruleKey=python:S8409
sonar.issue.ignore.multicriteria.fa2.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.fa3.ruleKey=python:S8415
sonar.issue.ignore.multicriteria.fa3.resourceKey=**/*.py
sonar.issue.ignore.multicriteria.lanbind.ruleKey=python:S8392
sonar.issue.ignore.multicriteria.lanbind.resourceKey=**/desktop_entry.py
sonar.issue.ignore.multicriteria.twsri.ruleKey=Web:S5725
sonar.issue.ignore.multicriteria.twsri.resourceKey=**/base.html
sonar.issue.ignore.multicriteria.jinjali.ruleKey=Web:ItemTagNotWithinContainerTagCheck
sonar.issue.ignore.multicriteria.jinjali.resourceKey=**/set_calendar.html
