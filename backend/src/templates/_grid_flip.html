{# Grid hover-flip for double-faced cards: clicking the flip button on a card thumbnail swaps to the
   other face instead of navigating. Delegated on document so it survives HTMX result swaps. #}
<script>
(function () {
  document.addEventListener("click", function (e) {
    var btn = e.target.closest && e.target.closest(".grid-flip-btn");
    if (!btn) return;
    e.preventDefault();     // don't follow the card link
    e.stopPropagation();
    var img = btn.closest("a") && btn.closest("a").querySelector("img.grid-card-img");
    if (!img) return;
    var toBack = img.dataset.face !== "back";
    var next = toBack ? img.dataset.back : img.dataset.front;
    // Only accept a same-origin path or an http(s)/data image URL before assigning to .src —
    // never a "javascript:"-style value from the attribute.
    if (!next || !/^(?:\/(?!\/)|https?:\/\/|data:image\/)/.test(next)) return;
    img.classList.remove("grid-flipping");
    img.getBoundingClientRect();   // force reflow so the animation restarts on rapid clicks
    img.classList.add("grid-flipping");
    setTimeout(function () {
      img.src = next;
      img.dataset.face = toBack ? "back" : "front";
    }, 150);                // swap at the edge-on midpoint of the flip
    setTimeout(function () { img.classList.remove("grid-flipping"); }, 340);
  });
})();
</script>
