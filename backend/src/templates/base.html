<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}scryme{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <!-- Apply the saved theme + custom accent before paint to avoid a flash of the default theme. -->
  <script>
    (function () {
      try {
        var d = document.documentElement;
        // Theme = palette + light/dark mode. Migrate the pre-split `scryme-theme` once.
        var pal = localStorage.getItem("scryme-palette");
        var mode = localStorage.getItem("scryme-mode");
        if (!pal) {
          var map = { midnight: ["midnight", "dark"], slate: ["slate", "dark"],
                      light: ["slate", "light"], parchment: ["midnight", "light"] };
          var m = map[localStorage.getItem("scryme-theme")] || ["trop-orange", "dark"];
          pal = m[0]; mode = mode || m[1];
          localStorage.setItem("scryme-palette", pal);
          localStorage.setItem("scryme-mode", mode);
        }
        if (!mode) { mode = "dark"; localStorage.setItem("scryme-mode", mode); }
        d.setAttribute("data-theme", pal + "-" + mode);
        var a = localStorage.getItem("scryme-accent");
        if (a) d.style.setProperty("--c-accent", a);
        // Card-effect settings (foil animation speed, hover spin) — applied before paint.
        var fs = localStorage.getItem("scryme-foil-speed");
        if (fs) d.style.setProperty("--foil-speed", (11 - parseInt(fs, 10)) + "s");
        var ss = localStorage.getItem("scryme-spin-speed");
        if (ss) d.style.setProperty("--spin-speed", ((12 - parseInt(ss, 10)) * 0.06).toFixed(2) + "s");
        if (localStorage.getItem("scryme-spin") !== "0") d.classList.add("spin-on");  // default on
      } catch (e) {}
    })();
  </script>
  <!-- Tailwind via CDN keeps the app a single pure-Python service; swap for a build step later. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Map Tailwind color utilities to the semantic CSS-variable tokens defined in app.css.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "var(--c-bg)",
            surface: "var(--c-surface)",
            "surface-2": "var(--c-surface-2)",
            "surface-3": "var(--c-surface-3)",
            edge: "var(--c-edge)",
            fg: "var(--c-fg)",
            muted: "var(--c-muted)",
            accent: "var(--c-accent)",
            "accent-fg": "var(--c-accent-fg)",
          },
          fontFamily: {
            title: ['"Cinzel"', "serif"],
            card: ['"EB Garamond"', "Garamond", "serif"],
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <!-- MTG symbol fonts (Mana = mana pips, Keyrune = set symbols); see static/vendor/*/NOTICE. -->
  <link rel="stylesheet" href="/static/vendor/mana/mana.css" />
  <link rel="stylesheet" href="/static/vendor/keyrune/keyrune.css" />
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body class="h-full bg-bg text-fg antialiased">
  {% if read_only %}
  <div class="bg-amber-500/90 text-slate-900 text-center text-sm py-1 font-medium">
    Demo mode &mdash; this is a shared, read-only sandbox collection.
  </div>
  {% endif %}
  <main class="min-h-full">
    {% block content %}{% endblock %}
  </main>
  {% include "_settings.html" %}
  {% include "_dragdrop.html" %}
  {% include "_alerts.html" %}
  {% include "_card_hover.html" %}
  {% include "_card_spin.html" %}
</body>
</html>
